name: API contract check

# Fails if any endpoint documented under docs/api/ or docs/lens/api/ does not
# exist in the real API surface (scripts/openapi-snapshot.json).
# Refresh the snapshot with the command in scripts/check-api-contract.mjs's
# header whenever the API adds/renames endpoints.
# Security note: no untrusted event data is interpolated in run commands.

on:
  push:
    branches: [main]
    paths:
      - 'docs/api/**'
      - 'docs/lens/api/**'
      - 'scripts/check-api-contract.mjs'
      - 'scripts/openapi-snapshot.json'
  pull_request:
    paths:
      - 'docs/api/**'
      - 'docs/lens/api/**'
      - 'scripts/check-api-contract.mjs'
      - 'scripts/openapi-snapshot.json'
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check documented endpoints against the API spec
        run: node scripts/check-api-contract.mjs
