name: cs-agent re-ingest
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'blog/**'
      - 'integrations/**'
  workflow_dispatch:

concurrency:
  group: cs-agent-reingest
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger ingest via SSH
        env:
          SSH_HOST: ${{ secrets.HETZNER_SSH_HOST }}
          SSH_USER: ${{ secrets.HETZNER_SSH_USER }}
          # HETZNER_SSH_KEY_B64 = base64 de la private key (una sola línea,
          # a prueba de copy-paste que pierde saltos de línea).
          SSH_KEY_B64: ${{ secrets.HETZNER_SSH_KEY_B64 }}
        run: |
          set +e
          echo "::add-mask::$SSH_HOST"
          echo "::add-mask::$SSH_USER"

          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if ssh-keygen -l -f ~/.ssh/id_ed25519 > /tmp/keychk 2>&1; then
            echo "key format: OK (type $(awk '{print $NF}' /tmp/keychk))"
          else
            echo "key format: INVALID"
            cat /tmp/keychk
            exit 1
          fi

          ssh -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=30 \
              -i ~/.ssh/id_ed25519 \
              "$SSH_USER@$SSH_HOST" \
              > /dev/null 2> /tmp/sshlog
          EXIT=$?
          echo "ssh exit=$EXIT"
          if [ "$EXIT" -ne 0 ]; then
            grep -iE "permission denied|connection refused|timed out|no route|bad configuration|invalid|failed|warning" /tmp/sshlog | head -5
            exit $EXIT
          fi
          echo "ingest triggered OK"
