name: cs-agent re-ingest
  on:
    push:
      branches: [main]
      paths:
        - 'docs/**'
        - 'blog/**'
        - 'integrations/**'
    workflow_dispatch:

  concurrency:
    group: cs-agent-reingest
    cancel-in-progress: false

  jobs:
    trigger:
      runs-on: ubuntu-latest
      steps:
        - name: Trigger ingest via SSH
          env:
            SSH_HOST: ${{ secrets.HETZNER_SSH_HOST }}
            SSH_USER: ${{ secrets.HETZNER_SSH_USER }}
            SSH_KEY:  ${{ secrets.HETZNER_SSH_KEY }}
          run: |
            mkdir -p ~/.ssh
            echo "$SSH_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 "$SSH_USER@$SSH_HOST"
